<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link rel="stylesheet" href="style_final.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="infos">
          <div class="info">
            <h3>
              High Score:
              <span id="high-score">0</span>
            </h3>
          </div>
          <div class="info">
            <h3>
              Score:
              <span id="score">0</span>
            </h3>
          </div>
          <div class="info">
            <h3>
              Time :
              <span id="time">00-00</span>
            </h3>
          </div>
        </div>
        <div class="board">
          <!-- <div class="block"></div>
            <div class="block"></div>  uising js to get number of blocks -->
        </div>
      </section>
      <div class="modal">
        <div class="start-game">
          <h3>Welcome to the Snake Game</h3>
          <button class="btn btn-start">Start Game</button>
          <!-- <audio id="audio_eat" src="snake_sound.mp3" controls style="display: none;">audio</audio> -->
        </div>
        <div class="game-over">
          <h3>Game Over</h3>
          <div class="gameOverScore">

            <h3>Current Score: <span class="gameOverScoreCurrent"></span> </h3>
            <h3>High Score: <span class="gameOverScoreHigh"></span> </h3>
          </div>
          <button class="btn btn-restart">Restart Game</button>
        </div>
      </div>
    </main>
    
    <script src="final_script3.js"></script>
  </body>
</html>

<!-- no. blocks changes according to screen size ,
 each block height and width are same ( 20 x 20 ) -->
